<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Legacy · dynamic page</title>
    <style>
        /* === exact same style — only cleaner === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1e2f;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .card {
            max-width: 720px;
            width: 100%;
            background: #f8fafc;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.6), 0 8px 16px -6px #0f0f1e;
            padding: 2.5rem 2rem;
            border: 1px solid #cad5e0;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0b1e33;
            border-left: 8px solid #3b7f5c;
            padding-left: 1.2rem;
            margin-bottom: 1.8rem;
            line-height: 1.2;
            word-break: break-word;
        }
        .url-highlight {
            background: #e2e8f0;
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            margin: 1.8rem 0 1.5rem 0;
            border: 1px solid #94a3b8;
            box-shadow: inset 0 1px 4px #b0c0d0, 0 4px 0 #2c3e4e;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            word-break: break-all;
        }
        .url-highlight a {
            color: #0c4a6e;
            text-decoration: none;
            background: #f4f9ff;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            border: 1px solid #0284c7;
            display: inline-block;
            transition: 0.1s;
            box-shadow: 0 2px 0 #075985;
        }
        .url-highlight a:hover {
            background: #e0f2fe;
            border-color: #0369a1;
            box-shadow: 0 3px 0 #0b3b5c;
            transform: translateY(-1px);
        }
        .password-box {
            background: #1c2a3a;
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            margin: 2rem 0 1.2rem 0;
            color: #e6eefc;
            font-size: 1.7rem;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            border-left: 12px solid #c9a43b;
            box-shadow: 0 10px 0 #0e1a24;
        }
        .password-label {
            font-size: 1.2rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #adc4e0;
            background: #2a3f52;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }
        .password-value {
            background: #0f1a23;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            color: #facc15;
            text-shadow: 0 0 5px #ffbb00;
            font-size: 1.5rem;
            user-select: all;
            border: 1px solid #b68b40;
        }
        .secondary-info {
            margin-top: 2rem;
            border-top: 2px dashed #a0b8cc;
            padding-top: 1.2rem;
            font-size: 0.95rem;
            color: #2e4a6b;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            align-items: center;
        }
        .file-badge {
            background: #dce5ed;
            border-radius: 30px;
            padding: 0.3rem 1.2rem;
            font-family: monospace;
            font-size: 0.95rem;
            color: #102331;
            transition: all 0.1s;
        }
        .compile-date {
            background: #e9eff5;
            border-radius: 30px;
            padding: 0.3rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #0d3f5c;
            font-family: monospace;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .url-highlight { font-size: 1.3rem; padding: 0.7rem; }
            .password-box { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Minecraft Legacy for Windows (compiled)</h1>

        <!-- dynamic url container (starts empty) -->
        <div class="url-highlight" id="url-container">
            🔗 <a href="#" id="dynamic-link" target="_blank" rel="noopener noreferrer">⚠️ loading...</a>
        </div>

        <!-- dynamic password container (starts empty) -->
        <div class="password-box" id="password-container">
            <span class="password-label">🔑 PASSWORD</span>
            <span class="password-value" id="dynamic-password">⚠️ loading...</span>
        </div>

        <!-- dynamic build date + dynamic file size (both start empty) -->
        <div class="secondary-info">
            <span class="file-badge">📦 Minecraft Legacy.7z</span>
            <!-- size will be updated from SIZE: field -->
            <span class="file-badge" id="file-size-badge">🧾 ⏳ loading...</span>
            <span class="compile-date" id="build-date-container">📅 compiled: <span id="build-date-value">⏳ loading...</span></span>
        </div>
    </div>

    <script>
        (function() {
            // ----- helper: fetch with no-cache -----
            async function fetchTextFile(url, defaultValue = null) {
                try {
                    const response = await fetch(url, { cache: "no-store" });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const raw = await response.text();
                    return raw.trim() || defaultValue;
                } catch (e) {
                    console.warn(`failed to fetch ${url}:`, e);
                    return defaultValue;  // returns null if fetch fails
                }
            }

            // ----- parse url.txt with SIZE field -----
            // format: "URL: ... PSSWORD: ... SIZE: ..." (any order, case-insensitive)
            function parseUrlPasswordSize(text) {
                if (!text) return { url: null, pwd: null, size: null };

                let url = null;
                let pwd = null;
                let size = null;

                // case-insensitive regexps
                const urlMatch = text.match(/URL:\s*(\S+)/i);
                const pwdMatch = text.match(/PSSWORD:\s*(\S+)/i);
                const sizeMatch = text.match(/SIZE:\s*(.+?)(?:\r?\n|$)/i);

                if (urlMatch && urlMatch[1]) url = urlMatch[1].trim();
                if (pwdMatch && pwdMatch[1]) pwd = pwdMatch[1].trim();
                if (sizeMatch && sizeMatch[1]) size = sizeMatch[1].trim();

                return { url, pwd, size };
            }

            // ----- update UI -----
            async function refreshFromRepo() {
                // 1. fetch url.txt (contains URL + PSSWORD + SIZE)
                const urlTxtRaw = await fetchTextFile('url.txt');
                const { url, pwd, size } = parseUrlPasswordSize(urlTxtRaw);

                // 2. fetch build_date.txt (format DD-MM-AAAA HH:MM:SS)
                const buildDate = await fetchTextFile('build_date.txt');

                // 3. update DOM elements
                // URL link
                const linkEl = document.getElementById('dynamic-link');
                if (linkEl) {
                    if (url) {
                        let href = url;
                        if (!url.startsWith('http://') && !url.startsWith('https://')) {
                            href = 'http://' + url;
                        }
                        linkEl.href = href;
                        linkEl.textContent = url;
                    } else {
                        linkEl.href = '#';
                        linkEl.textContent = '❌ no url in url.txt';
                    }
                }

                // password
                const pwdEl = document.getElementById('dynamic-password');
                if (pwdEl) {
                    pwdEl.textContent = pwd || '❌ no password in url.txt';
                }

                // file size badge
                const sizeEl = document.getElementById('file-size-badge');
                if (sizeEl) {
                    sizeEl.innerHTML = size ? `🧾 ${size}` : `🧾 ❌ no size in url.txt`;
                }

                // build date
                const dateEl = document.getElementById('build-date-value');
                if (dateEl) {
                    dateEl.textContent = buildDate || '❌ no build_date.txt';
                }
            }

            // ----- initial load and refresh setup -----
            refreshFromRepo();

            // Re-fetch when tab becomes visible (user returns to the page)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    refreshFromRepo();
                }
            });

            // Also check every 2 minutes for background updates
            setInterval(refreshFromRepo, 120000);
        })();
    </script>
</body>
</html>
